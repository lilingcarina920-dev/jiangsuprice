<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每周产品价格采集 - 江苏市场</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 15px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .header p { font-size: 14px; color: #1890ff; font-weight: 500; }
        
        .product-item .hint {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            max-width: 300px;
        }
        .modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .modal-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1890ff;
        }
        .form-group input:disabled {
            background: #f5f5f5;
            color: #999;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary { background: #1890ff; color: white; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-primary:disabled { background: #d9d9d9; cursor: not-allowed; }
        
        .error { color: #ff4d4f; font-size: 14px; margin-top: 8px; }
        .success { color: #52c41a; font-size: 14px; margin-top: 8px; text-align: center; padding: 20px; }
        
        .info-box {
            background: #e6f7ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .info-box .title { font-size: 16px; font-weight: 500; color: #333; margin-bottom: 8px; }
        .info-box .detail { font-size: 14px; color: #666; line-height: 1.6; }
        
        .date-box {
            text-align: center;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .date-box .today { font-size: 24px; font-weight: 600; color: #1890ff; }
        .date-box .weekday { font-size: 14px; color: #666; }
        
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .product-item {
            background: #fafafa;
            padding: 10px;
            border-radius: 8px;
        }
        .product-item label {
            font-size: 12px;
            color: #666;
            display: block;
            margin-bottom: 5px;
            line-height: 1.3;
        }
        .product-item input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            -moz-appearance: textfield;
        }
        .product-item input::-webkit-outer-spin-button,
        .product-item input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .hidden { display: none; }
        
        .section-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1890ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 验证页面 -->
        <div id="verifyPage" class="card">
            <div class="header">
                <h1>每周产品价格采集</h1>
                <p>（黄金叶江苏市场）</p>
            </div>
            
            <div class="date-box">
                <div class="today" id="todayDate"></div>
                <div class="weekday" id="todayWeekday"></div>
            </div>
            
            <div class="form-group">
                <label>请输入手机号验证身份</label>
                <input type="tel" id="phoneInput" placeholder="请输入手机号" maxlength="11">
            </div>
            
            <button class="btn btn-primary" id="verifyBtn">验证身份</button>
            <div id="verifyError" class="error hidden"></div>
        </div>
        
        <!-- 填写页面 -->
        <div id="fillPage" class="hidden">
            <div class="card">
                <div class="header">
                    <h1>每周产品价格采集</h1>
                    <p id="monthLabel2">江苏市场</p>
                </div>
                
                <div class="info-box">
                    <div class="title">商户信息</div>
                    <div class="detail">
                        <div>店名：<span id="shopName"></span></div>
                        <div>地市：<span id="shopCity"></span></div>
                    </div>
                </div>
                
                <div class="info-box" style="background: #fff7e6;">
                    <div class="title">采集信息</div>
                    <div class="detail">
                        <div>采集日：<span id="assignedWeekday"></span></div>
                        <div>归属日期：<span id="assignedDate"></span></div>
                        <div>补填截止：<span id="deadline"></span></div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="section-title">产品价格填写（元/条）</div>
                <form id="priceForm">
                    <div class="product-grid" id="productGrid"></div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 20px;">提交数据</button>
                </form>
                <div id="submitError" class="error hidden"></div>
                <div id="submitSuccess" class="success hidden">✅ 提交成功！感谢您的配合。</div>
            </div>
        </div>
        
        <!-- 成功弹窗 -->
        <div id="successModal" class="modal">
            <div class="modal-content">
                <div class="modal-icon">✅</div>
                <div class="modal-text">提交成功！<br>感谢您的配合</div>
                <button class="btn btn-primary" onclick="closeSuccessModal()">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 产品列表（27个产品，按固定顺序）
        const products = [
            { id: 'p1', name: '黄金叶（天叶细支3mg）', short: '天叶细支3mg' },
            { id: 'p2', name: '中华（细支3mg）', short: '中华细支3mg' },
            { id: 'p3', name: '黄金叶（软天叶）', short: '软天叶' },
            { id: 'p4', name: '利群（休闲细支）', short: '利群休闲' },
            { id: 'p5', name: '黄金叶（天叶细支）', short: '天叶细支' },
            { id: 'p6', name: '白沙（和天下）', short: '和天下' },
            { id: 'p7', name: '黄金叶（天叶）', short: '天叶' },
            { id: 'p8', name: '中华（金中支）', short: '中华金中支' },
            { id: 'p9', name: '南京（软九五）', short: '南京软九五' },
            { id: 'p10', name: '南京（细支九五）', short: '南京细支九五' },
            { id: 'p11', name: '黄金叶（天香细支）', short: '天香细支' },
            { id: 'p12', name: '南京（雨花石）', short: '南京雨花石' },
            { id: 'p13', name: '中华（细支）', short: '中华细支' },
            { id: 'p14', name: '黄金叶（大成细支）', short: '大成细支' },
            { id: 'p15', name: '黄金叶（商鼎）', short: '商鼎' },
            { id: 'p16', name: '中华（金细支）', short: '中华金细支' },
            { id: 'p17', name: '中华（软）', short: '中华软' },
            { id: 'p18', name: '中华（细支6mg）', short: '中华细支6mg' },
            { id: 'p19', name: '中华（双中支）', short: '中华双中支' },
            { id: 'p20', name: '中华（硬）', short: '中华硬' },
            { id: 'p21', name: '南京（细支九五3mg）', short: '南京细支九五3mg' },
            { id: 'p22', name: '南京（大观园爆冰）', short: '南京大观园' },
            { id: 'p23', name: '南京（十二钗烤烟）', short: '南京十二钗' },
            { id: 'p24', name: '芙蓉王（硬）', short: '芙蓉王硬' },
            { id: 'p25', name: '钻石（细支荷花）', short: '细支荷花' },
            { id: 'p26', name: '钻石（软荷花）', short: '软荷花' },
            { id: 'p27', name: '钻石（荷花）', short: '荷花' }
        ];
        
        // 地市排序（13个地市，按固定顺序）
        const cities = ['南京', '无锡', '徐州', '常州', '苏州', '南通', '连云港', '淮安', '盐城', '扬州', '镇江', '泰州', '宿迁'];
        
        let merchants = [];
        let currentMerchant = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadMerchants();
            generateProductForm();
            updateDateDisplay();
            
            // 绑定验证身份按钮事件
            document.getElementById('verifyBtn').addEventListener('click', handleVerify);
        });
        
        // 加载商户白名单
        async function loadMerchants() {
            try {
                const response = await fetch('merchants.json');
                merchants = await response.json();
                console.log('商户数据加载成功:', merchants.length, '户');
                // 显示加载成功提示
                const errorEl = document.getElementById('verifyError');
                errorEl.textContent = '商户数据加载成功，请输入手机号验证';
                errorEl.style.color = '#52c41a'; // 绿色
                errorEl.classList.remove('hidden');
                setTimeout(() => {
                    errorEl.classList.add('hidden');
                    errorEl.style.color = '';
                }, 2000);
            } catch (error) {
                console.error('加载商户数据失败:', error);
                const errorEl = document.getElementById('verifyError');
                errorEl.textContent = '商户数据加载失败，请刷新页面重试';
                errorEl.classList.remove('hidden');
            }
        }
        
        // 生成产品表单
        function generateProductForm() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-item">
                    <label>${p.name}</label>
                    <input type="text" name="${p.id}" placeholder="元/条" pattern="[0-9]*" inputmode="numeric" required>
                    <div class="hint">如无此产品在售，填0</div>
                </div>
            `).join('');
        }
        
        // 更新日期显示
        function updateDateDisplay() {
            const now = new Date();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const month = now.getMonth() + 1;
            const day = now.getDate();
            
            document.getElementById('todayDate').textContent = `${month}月${day}日`;
            document.getElementById('todayWeekday').textContent = weekdays[now.getDay()];
            
            // 显示采集周期
            const monthLabel = `${now.getFullYear()}年${month}月采集周期`;
            document.getElementById('monthLabel2').textContent = monthLabel;
        }
        
        // 获取本月最后一天
        function getLastDayOfMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }
        
        // 获取本周某天对应的日期（如果在本月内）
        function getAssignedDate(weekday, today) {
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const targetWeekday = weekdays.indexOf(weekday);
            const todayWeekday = today.getDay();
            
            // 计算本周该星期几的日期
            const diff = targetWeekday - todayWeekday;
            const assignedDate = new Date(today);
            assignedDate.setDate(today.getDate() + diff);
            
            // 判断是否在本月内
            if (assignedDate.getMonth() !== today.getMonth()) {
                // 不在本月内，返回null
                return null;
            }
            
            return assignedDate;
        }
        
        // 验证身份
        function handleVerify() {
            console.log('验证身份按钮被点击');
            console.log('merchants 数量:', merchants.length);
            
            const phone = document.getElementById('phoneInput').value.trim();
            const errorEl = document.getElementById('verifyError');
            
            console.log('输入的手机号:', phone);
            
            if (!/^1\d{10}$/.test(phone)) {
                errorEl.textContent = '请输入正确的手机号';
                errorEl.classList.remove('hidden');
                return;
            }
            
            if (merchants.length === 0) {
                errorEl.textContent = '商户数据未加载，请稍后再试';
                errorEl.classList.remove('hidden');
                return;
            }
            
            const merchant = merchants.find(m => m.phone === phone);
            console.log('查找到的商户:', merchant);
            
            if (!merchant) {
                errorEl.textContent = '手机号未在采集户名单中，请确认后重试';
                errorEl.classList.remove('hidden');
                return;
            }
            
            // 计算归属日期
            const today = new Date();
            const assignedDate = getAssignedDate(merchant.weekday, today);
            
            if (!assignedDate) {
                errorEl.textContent = `您是【${merchant.weekday}】采集户，本周该日期不在本月范围内`;
                errorEl.classList.remove('hidden');
                return;
            }
            
            // 验证通过
            currentMerchant = {
                ...merchant,
                assignedDate: assignedDate
            };
            errorEl.classList.add('hidden');
            
            // 显示商户信息
            document.getElementById('shopName').textContent = merchant.shop_name;
            document.getElementById('shopCity').textContent = merchant.city;
            document.getElementById('assignedWeekday').textContent = merchant.weekday;
            
            const month = assignedDate.getMonth() + 1;
            const day = assignedDate.getDate();
            document.getElementById('assignedDate').textContent = `${month}月${day}日（${merchant.weekday}）`;
            
            // 计算补填截止日期
            // 规则：本周周日的24点，如果周日跨月则用本月最后一天
            const dayOfWeek = today.getDay(); // 0是周日，1是周一...
            const diffToSunday = dayOfWeek === 0 ? 0 : 7 - dayOfWeek; // 距离周日的天数
            const thisSunday = new Date(today);
            thisSunday.setDate(today.getDate() + diffToSunday);
            
            let deadlineMonth, deadlineDay;
            if (thisSunday.getMonth() === today.getMonth() && thisSunday.getFullYear() === today.getFullYear()) {
                // 周日在本月内 → 补填截止 = 本周周日
                deadlineMonth = thisSunday.getMonth() + 1;
                deadlineDay = thisSunday.getDate();
            } else {
                // 周日不在本月内 → 补填截止 = 本月最后一天
                deadlineMonth = today.getMonth() + 1;
                deadlineDay = getLastDayOfMonth(today.getFullYear(), today.getMonth() + 1);
            }
            
            document.getElementById('deadline').textContent = `${deadlineMonth}月${deadlineDay}日24点`;
            // 查询是否已提交，如果已提交则填充表单
            try {
                const merchantDataRes = await fetch(`/api/merchant-data?merchant_id=${merchant.id}&assigned_date=${assignedDate.toISOString().split('T')[0]}`);
                const merchantData = await merchantDataRes.json();
                
                if (merchantData && merchantData.prices) {
                    // 已提交，填充表单
                    products.forEach(p => {
                        const input = document.querySelector(`input[name="${p.id}"]`);
                        if (input && merchantData.prices[p.id] !== undefined) {
                            input.value = merchantData.prices[p.id];
                        }
                    });
                }
            } catch (e) {
                console.log('查询已提交数据失败:', e);
            }
            // 切换页面
            document.getElementById('verifyPage').classList.add('hidden');
            document.getElementById('fillPage').classList.remove('hidden');
        }
        
        // 提交表单
        document.getElementById('priceForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const now = new Date();
            
            // 验证所有产品必填且为数字
            for (const p of products) {
                const value = formData.get(p.id);
                if (value === '' || value === null) {
                    alert(`请填写${p.name}的价格，如无此产品在售，填0`);
                    return;
                }
                if (!/^\d+$/.test(value)) {
                    alert(`${p.name}的价格只能填写数字，如无此产品在售，填0`);
                    return;
                }
            }
            
            const data = {
                merchant_id: currentMerchant.id,
                shop_name: currentMerchant.shop_name,
                city: currentMerchant.city,
                contact: currentMerchant.contact,
                phone: currentMerchant.phone,
                assigned_weekday: currentMerchant.weekday,
                assigned_date: currentMerchant.assignedDate.toISOString().split('T')[0],
                submitted_at: now.toISOString(),
                month: `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`,
                prices: {}
            };
            
            products.forEach(p => {
                const value = formData.get(p.id);
                data.prices[p.id] = value ? parseFloat(value) : 0;
            });
            
            try {
                const apiBase = '';
                
            // 检查是否已过截止日期（复用显示逻辑）
                const dayOfWeek = now.getDay();
                const diffToSunday = dayOfWeek === 0 ? 0 : 7 - dayOfWeek;
                const thisSunday = new Date(now);
                thisSunday.setDate(now.getDate() + diffToSunday);
                
                let deadlineDate;
                if (thisSunday.getMonth() === now.getMonth() && thisSunday.getFullYear() === now.getFullYear()) {
                    deadlineDate = new Date(thisSunday);
                } else {
                    // 本月最后一天
                    deadlineDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                }
                deadlineDate.setHours(24, 0, 0, 0);
                
                if (now > deadlineDate) {
                    alert('已过补填截止日期，无法提交');
                    return;
                }
                
                const response = await fetch(`${apiBase}/api/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 显示成功弹窗
                    document.getElementById('successModal').classList.add('show');
                    e.target.querySelector('button[type="submit"]').disabled = true;
                } else {
                    document.getElementById('submitError').textContent = result.message || '提交失败，请重试';
                    document.getElementById('submitError').classList.remove('hidden');
                }
            } catch (error) {
                console.error('提交失败:', error);
                document.getElementById('submitError').textContent = '网络错误，请重试';
                document.getElementById('submitError').classList.remove('hidden');
            }
        });
        
        function closeSuccessModal() {
            document.getElementById('successModal').classList.remove('show');
        }
    </script>
</body>
</html>
